name: lint

on: [push, pull_request]

jobs:
  licensecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

    - name: Install dependencies
      run: |
        sudo apt install -qq licensecheck

    - name: Check licenses
      run: |
        ./scripts/check_licenses.sh
