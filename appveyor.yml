# stats available at
# https://ci.appveyor.com/project/strukturag/libde265
version: 1.0.{build}

environment:
  matrix:
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2019
      GENERATOR: "Visual Studio 16 2019"
      ARCH: x64
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      GENERATOR: "Visual Studio 17 2022"
      ARCH: x64
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      GENERATOR: "Visual Studio 17 2022"
      ARCH: ARM64

configuration:
  - Debug
  - Release

build:
  verbosity: normal

install:
  - git clone https://github.com/strukturag/libde265-data.git

build_script:
  - cmake -G "%GENERATOR%" -A %ARCH% -H. -Bbuild -DENABLE_ENCODER=OFF
  - cmake --build build --config %CONFIGURATION%

before_test:
  - if not "%ARCH%"=="ARM64" copy /y build\dec265\%CONFIGURATION%\dec265.exe build
  - if not "%ARCH%"=="ARM64" copy /y build\libde265\%CONFIGURATION%\libde265.dll build

test_script:
  - if not "%ARCH%"=="ARM64" build\dec265.exe -q -c -f 100 libde265-data\IDR-only\paris-352x288-intra.bin
  - if not "%ARCH%"=="ARM64" build\dec265.exe -t 4 -q -c -f 100 libde265-data\IDR-only\paris-352x288-intra.bin
  - if not "%ARCH%"=="ARM64" build\dec265.exe -q -c -f 100 libde265-data\RandomAccess\paris-ra-wpp.bin
  - if not "%ARCH%"=="ARM64" build\dec265.exe -t 4 -q -c -f 100 libde265-data\RandomAccess\paris-ra-wpp.bin

artifacts:
  - path: libde265/Release/libde265.dll

deploy:
  provider: GitHub
  auth_token:
    secure: boWJ9aVfVBpOkBGzWF5yS5/Os3eDUjFfziOY04+LNA+7v+PnMFBtHeMJe2PjK4gm
  artifact: libde265/Release/libde265.dll
  on:
    appveyor_repo_tag: true        # deploy on tag push only
