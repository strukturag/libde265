# stats available at
# https://ci.appveyor.com/project/strukturag/libde265
version: 1.0.{build}

environment:
  matrix:
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2019
      GENERATOR: "Visual Studio 16 2019"
      ARCH: x64
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      GENERATOR: "Visual Studio 17 2022"
      ARCH: x64
    - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2022
      GENERATOR: "Visual Studio 17 2022"
      ARCH: ARM64

configuration:
  - Debug

build:
  verbosity: normal

install:
  - git clone https://github.com/strukturag/libde265-data.git

build_script:
  - cmake -G "%GENERATOR%" -A %ARCH% -H. -Bbuild -DENABLE_ENCODER=OFF
  - cmake --build build --config %CONFIGURATION%

before_test:
  - ps: >-
      if($env:ARCH -ne "ARM64") {
        copy build\dec265\$env:CONFIGURATION\dec265.exe build;
        copy build\libde265\$env:CONFIGURATION\libde265.dll build
      }

test_script:
  - ps: >-
      if($env:ARCH -ne "ARM64") {
        & build\dec265.exe -q -c -f 100 libde265-data\IDR-only\paris-352x288-intra.bin 2>&1;
        if($LASTEXITCODE -ne 0) { throw "dec265 failed" };
        & build\dec265.exe -t 4 -q -c -f 100 libde265-data\IDR-only\paris-352x288-intra.bin 2>&1;
        if($LASTEXITCODE -ne 0) { throw "dec265 failed" };
        & build\dec265.exe -q -c -f 100 libde265-data\RandomAccess\paris-ra-wpp.bin 2>&1;
        if($LASTEXITCODE -ne 0) { throw "dec265 failed" };
        & build\dec265.exe -t 4 -q -c -f 100 libde265-data\RandomAccess\paris-ra-wpp.bin 2>&1;
        if($LASTEXITCODE -ne 0) { throw "dec265 failed" }
      }

artifacts:
  - path: build
